<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evaluación Primer Parcial</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep:    #010b1a;
      --blue-dark:  #0a2a5e;
      --blue-main:  #0d5bdd;
      --blue-light: #1a9fff;
      --cyan:       #00e5ff;
      --cyan-glow:  #00e5ffaa;
      --white:      #e8f4ff;
      --grid-color: #0d3a7033;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-deep);
      color: var(--white);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes gridMove { from{background-position:0 0} to{background-position:0 40px} }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.15) 2px, rgba(0,0,0,.15) 4px);
      pointer-events: none; z-index: 0;
    }

    /* HEADER */
    header {
      position: relative; z-index: 10;
      width: 100%;
      padding: 40px 24px 22px;
      text-align: center;
      background: linear-gradient(180deg, #000d1ecc 0%, transparent 100%);
    }

    .badge {
      display: inline-block;
      font-family: 'Press Start 2P', monospace;
      font-size: .5rem; letter-spacing: .15em;
      color: var(--cyan); border: 1px solid var(--cyan);
      padding: 6px 14px; margin-bottom: 18px;
      text-shadow: 0 0 8px var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 8px rgba(0,229,255,.08);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 3.5vw, 2rem);
      line-height: 1.65; color: var(--white);
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px var(--blue-light), 0 0 30px var(--blue-main), 3px 3px 0 #000d1e; }
      to   { text-shadow: 0 0 20px var(--cyan), 0 0 60px var(--blue-light), 3px 3px 0 #000d1e; }
    }

    .divider {
      position: relative; z-index: 10;
      width: min(700px, 90vw); height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--blue-main), var(--cyan), transparent);
      margin: 14px auto 28px;
      box-shadow: 0 0 12px var(--cyan-glow);
    }

    /* MAIN */
    main {
      position: relative; z-index: 10;
      width: min(860px, 96vw);
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 50px;
    }

    /* TARJETA ALUMNO */
    .alumno-card {
      background: linear-gradient(135deg, #021830ee, #0a1e40ee);
      border: 1px solid var(--blue-main);
      border-radius: 6px; overflow: hidden;
      box-shadow: 0 0 20px rgba(13,91,221,.3);
      display: flex; align-items: center;
      gap: 24px; padding: 22px 28px;
      position: relative;
    }
    .alumno-card::before {
      content:''; position:absolute; top:-1px; left:-1px;
      width:14px; height:14px;
      border:2px solid var(--cyan); border-right:none; border-bottom:none;
    }
    .alumno-card::after {
      content:''; position:absolute; bottom:-1px; right:-1px;
      width:14px; height:14px;
      border:2px solid var(--cyan); border-left:none; border-top:none;
    }
    .alumno-avatar {
      font-size: 2.6rem;
      filter: drop-shadow(0 0 10px var(--cyan));
      flex-shrink: 0;
    }
    .alumno-info { display:flex; flex-direction:column; gap:8px; }
    .alumno-label {
      font-family:'Press Start 2P', monospace;
      font-size:.42rem; letter-spacing:.2em;
      color:var(--blue-light); opacity:.6; text-transform:uppercase;
    }
    .alumno-nombre {
      font-family:'Press Start 2P', monospace;
      font-size:.72rem; letter-spacing:.05em;
      color:var(--cyan);
      text-shadow: 0 0 12px var(--cyan-glow);
    }
    .alumno-grupo {
      font-family:'Orbitron', sans-serif;
      font-size:.85rem; font-weight:700; letter-spacing:.3em;
      color:var(--white);
    }

    /* VIDEO CARD */
    .video-card {
      background: linear-gradient(135deg, #021830ee, #0a1e40ee);
      border: 1px solid var(--blue-main);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(13,91,221,.35), 0 0 80px rgba(0,229,255,.08);
      position: relative;
    }
    .video-card::before {
      content:''; position:absolute; top:-1px; left:-1px;
      width:18px; height:18px;
      border:2px solid var(--cyan); border-right:none; border-bottom:none; z-index:2;
    }
    .video-card::after {
      content:''; position:absolute; bottom:-1px; right:-1px;
      width:18px; height:18px;
      border:2px solid var(--cyan); border-left:none; border-top:none; z-index:2;
    }

    .card-header {
      display:flex; align-items:center; gap:10px;
      padding: 12px 18px;
      background: linear-gradient(90deg, #041226, #0a2040);
      border-bottom: 1px solid var(--blue-dark);
    }
    .dot { width:9px; height:9px; border-radius:50%; }
    .dot-r { background:#ff4d6d; box-shadow:0 0 5px #ff4d6d; }
    .dot-y { background:#ffd60a; box-shadow:0 0 5px #ffd60a; }
    .dot-g { background:#2bff88; box-shadow:0 0 5px #2bff88; }
    .card-label { font-size:.6rem; letter-spacing:.2em; color:var(--blue-light); margin-left:6px; text-transform:uppercase; }

    #videoPlayer {
      width: 100%;
      display: block;
      background: #000;
      outline: none;
    }

    .file-bar {
      display:flex; align-items:center; gap:8px;
      padding:9px 18px;
      background:#041020; border-top:1px solid var(--blue-dark);
      font-size:.55rem; color:var(--blue-light); letter-spacing:.1em;
    }

    /* HUD */
    .hud { position:fixed; z-index:5; font-family:'Press Start 2P', monospace; font-size:.38rem; color:var(--blue-light); opacity:.22; letter-spacing:.1em; }
    .hud-tl { top:14px; left:14px; }
    .hud-br { bottom:14px; right:14px; text-align:right; }

    footer {
      position:relative; z-index:10;
      text-align:center; padding:0 0 24px;
      font-family:'Press Start 2P', monospace;
      font-size:.4rem; color:var(--blue-main);
      letter-spacing:.1em; opacity:.45;
    }
  </style>
</head>
<body>

<div class="hud hud-tl">SYS::ONLINE<br/>VER 1.0.0<br/>──────────</div>
<div class="hud hud-br">──────────<br/>MODO EXAMEN<br/>ACTIVO</div>

<header>
  <div class="badge">▶ NIVEL 1 · BLOQUE I ◀</div>
  <h1>EVALUACIÓN<br/>PRIMER PARCIAL</h1>
</header>

<div class="divider"></div>

<main>

  <!-- INFO ALUMNO -->
  <div class="alumno-card">
    <div class="alumno-avatar">🎮</div>
    <div class="alumno-info">
      <span class="alumno-label">▸ Alumno</span>
      <span class="alumno-nombre">Víctor Ángel Jácome Morán</span>
      <span class="alumno-grupo">GRUPO · 6A</span>
    </div>
  </div>

  <!-- VIDEO -->
  <div class="video-card">
    <div class="card-header">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="card-label">▸ REPRODUCTOR DE VIDEO</span>
    </div>

    <video id="videoPlayer" controls>
      <source src="proyecto.mp4" type="video/mp4"/>
      Tu navegador no soporta el elemento de video.
    </video>

    <div class="file-bar">
      <span style="opacity:.4">▸</span>
      <span>proyecto.mp4</span>
    </div>
  </div>

</main>

<footer>© EVALUACIÓN PRIMER PARCIAL · TODOS LOS DERECHOS RESERVADOS</footer>

</body>
</html>
